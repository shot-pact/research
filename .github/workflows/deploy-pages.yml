name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bill-auditor/live-flow
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bill-auditor/live-flow/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Assemble site
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p _site/bill-auditor/live-flow
          cp -r bill-auditor/live-flow/dist/. _site/bill-auditor/live-flow/
          # Preserve existing static research pages
          cp index.html _site/index.html
          mkdir -p _site/bill-auditor/features
          cp bill-auditor/features/index.html _site/bill-auditor/features/index.html
          mkdir -p _site/scroll-wars
          cp -r scroll-wars/. _site/scroll-wars/
          mkdir -p _site/ideas
          cp -r ideas/. _site/ideas/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
